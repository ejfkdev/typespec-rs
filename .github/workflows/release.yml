name: Release
permissions:
  contents: write

on:
  push:
    tags:
      - '**[0-9]+.[0-9]+.[0-9]+*'

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@1.95.0
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --lib
      - run: cargo test -p tspc
      - run: cargo test --examples

  plan:
    needs: test
    runs-on: ubuntu-22.04
    outputs:
      val: ${{ steps.plan.outputs.manifest }}
      tag: ${{ github.ref_name }}
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v6
      - name: Install dist
        shell: bash
        run: curl --proto '=https' --tlsv1.2 -LsSf https://github.com/axodotdev/cargo-dist/releases/download/v0.31.0/cargo-dist-installer.sh | sh
      - id: plan
        shell: bash
        run: |
          dist host --steps=create --tag=${{ github.ref_name }} --output-format=json > plan-dist-manifest.json
          echo "dist ran successfully"
          cat plan-dist-manifest.json
          echo "manifest=$(jq -c "." plan-dist-manifest.json)" >> "$GITHUB_OUTPUT"

  build:
    needs: plan
    if: ${{ fromJson(needs.plan.outputs.val).ci.github.artifacts_matrix.include != null }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.plan.outputs.val).ci.github.artifacts_matrix }}
    runs-on: ${{ matrix.runner }}
    container: ${{ matrix.container && matrix.container.image || null }}
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Enable Windows longpaths
        run: git config --global core.longpaths true

      - uses: actions/checkout@v6

      - name: Install Rust (container)
        if: ${{ matrix.container }}
        run: |
          if ! command -v cargo > /dev/null 2>&1; then
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
            echo "$HOME/.cargo/bin" >> $GITHUB_PATH
          fi

      - name: Install dist
        run: ${{ matrix.install_dist.run }}

      - name: Install dependencies
        run: ${{ matrix.packages_install }}

      - name: Build with dist
        shell: bash
        run: |
          dist build --tag=${{ github.ref_name }} --print=linkage --output-format=json ${{ matrix.dist_args }} > dist-manifest.json
          echo "dist ran successfully"

      # Extract raw binary from cargo target directory
      - name: Extract raw binary
        shell: bash
        run: |
          mkdir -p raw-binaries
          for target in ${{ join(matrix.targets, ' ') }}; do
            found=false
            for profile in dist release; do
              if [ -f "target/${target}/${profile}/tspc.exe" ]; then
                cp "target/${target}/${profile}/tspc.exe" "raw-binaries/tspc-${target}.exe"
                echo "Extracted: tspc-${target}.exe ($(ls -lh "target/${target}/${profile}/tspc.exe" | awk '{print $5}'))"
                found=true
                break
              elif [ -f "target/${target}/${profile}/tspc" ]; then
                cp "target/${target}/${profile}/tspc" "raw-binaries/tspc-${target}"
                chmod +x "raw-binaries/tspc-${target}"
                echo "Extracted: tspc-${target} ($(ls -lh "target/${target}/${profile}/tspc" | awk '{print $5}'))"
                found=true
                break
              fi
            done
            if [ "$found" = false ]; then
              echo "WARNING: Binary not found for ${target}, searching..."
              find target/ -type f \( -name "tspc" -o -name "tspc.exe" \) 2>/dev/null || true
            fi
          done

      # UPX compression (skip macOS — Apple code signing breaks)
      - name: Install UPX (Linux x86_64 runner)
        if: runner.os == 'Linux' && !matrix.container
        run: |
          UPX_VERSION="4.2.4"
          curl -L "https://github.com/upx/upx/releases/download/v${UPX_VERSION}/upx-${UPX_VERSION}-amd64_linux.tar.xz" -o upx.tar.xz
          tar xf upx.tar.xz
          mkdir -p ~/.local/bin
          cp "upx-${UPX_VERSION}-amd64_linux/upx" ~/.local/bin/
          echo "$HOME/.local/bin" >> $GITHUB_PATH
        shell: bash

      - name: Install UPX (Linux container)
        if: runner.os == 'Linux' && matrix.container
        run: |
          UPX_VERSION="4.2.4"
          ARCH=$(uname -m)
          if [ "$ARCH" = "aarch64" ]; then
            curl -L "https://github.com/upx/upx/releases/download/v${UPX_VERSION}/upx-${UPX_VERSION}-arm64_linux.tar.xz" -o upx.tar.xz
            tar xf upx.tar.xz
            cp "upx-${UPX_VERSION}-arm64_linux/upx" /usr/local/bin/ || cp "upx-${UPX_VERSION}-arm64_linux/upx" ~/.local/bin/
          else
            curl -L "https://github.com/upx/upx/releases/download/v${UPX_VERSION}/upx-${UPX_VERSION}-amd64_linux.tar.xz" -o upx.tar.xz
            tar xf upx.tar.xz
            cp "upx-${UPX_VERSION}-amd64_linux/upx" /usr/local/bin/ || cp "upx-${UPX_VERSION}-amd64_linux/upx" ~/.local/bin/
          fi
          echo "$HOME/.local/bin" >> $GITHUB_PATH
        shell: bash

      - name: Install UPX (Windows)
        if: runner.os == 'Windows'
        run: |
          $UPX_VERSION = "4.2.4"
          Invoke-WebRequest -Uri "https://github.com/upx/upx/releases/download/v${UPX_VERSION}/upx-${UPX_VERSION}-win64.zip" -OutFile upx.zip
          Expand-Archive -Path upx.zip -DestinationPath .
          Copy-Item "upx-${UPX_VERSION}-win64/upx.exe" -Destination "C:\Windows\System32\"
        shell: powershell

      - name: Compress binaries with UPX
        if: runner.os != 'macOS'
        shell: bash
        run: |
          shopt -s nullglob
          for f in raw-binaries/tspc-*; do
            if [ -f "$f" ]; then
              echo "Compressing $f with UPX..."
              upx --best "$f" && echo "Compressed: $(ls -lh "$f" | awk '{print $5}')" || echo "UPX compression failed for $f, continuing..."
            fi
          done

      - name: Show binary sizes
        shell: bash
        run: ls -lh raw-binaries/ 2>/dev/null || dir raw-binaries\

      - name: Upload raw binary
        uses: actions/upload-artifact@v7
        with:
          name: binary-${{ join(matrix.targets, '_') }}
          path: raw-binaries/tspc-*

  release:
    needs: [plan, build]
    if: ${{ always() && needs.plan.result == 'success' && needs.build.result != 'failure' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v6

      - name: Download all binaries
        uses: actions/download-artifact@v8
        with:
          pattern: binary-*
          path: release-binaries
          merge-multiple: true

      - name: List release binaries
        run: ls -lh release-binaries/

      - name: Delete draft release
        run: gh release delete ${{ needs.plan.outputs.tag }} --yes || true

      - name: Create GitHub Release
        shell: bash
        run: |
          TAG="${{ needs.plan.outputs.tag }}"
          cat > /tmp/notes.md << 'NOTES'
          ## tspc binaries

          Cross-platform TypeSpec compiler binaries with UPX compression.

          ### Install

          **macOS / Linux**
          ```bash
          chmod +x tspc-<target>
          sudo mv tspc-<target> /usr/local/bin/tspc
          ```

          **Windows**
          Rename `tspc-<target>.exe` to `tspc.exe` and add to PATH.
          NOTES
          gh release create "$TAG" \
            --target "$GITHUB_SHA" \
            --title "$TAG" \
            --notes-file /tmp/notes.md \
            release-binaries/tspc-*
