name: Publish to crates.io

on:
  workflow_dispatch:
    inputs:
      crate:
        description: "Crate to publish (typespec_rs or tspc)"
        required: true
        default: "typespec_rs"
        type: choice
        options:
          - typespec_rs
          - tspc
          - both

env:
  CARGO_TERM_COLOR: always

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.95.0
      - name: Verify version matches tag (if triggered by tag)
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          CRATE_VERSION=$(grep '^version' Cargo.toml | head -1 | cut -d'"' -f2)
          if [ "$TAG_VERSION" != "$CRATE_VERSION" ]; then
            echo "Tag version ($TAG_VERSION) does not match Cargo.toml version ($CRATE_VERSION)"
            exit 1
          fi
      - name: Publish typespec_rs
        if: inputs.crate == 'typespec_rs' || inputs.crate == 'both'
        run: cargo publish -p typespec_rs --token ${{ secrets.CARGO_REGISTRY_TOKEN }}
      - name: Wait for typespec_rs to be available
        if: inputs.crate == 'both'
        run: sleep 30
      - name: Publish tspc
        if: inputs.crate == 'tspc' || inputs.crate == 'both'
        run: cargo publish -p tspc --token ${{ secrets.CARGO_REGISTRY_TOKEN }}
